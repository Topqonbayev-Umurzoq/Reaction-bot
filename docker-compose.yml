# docker-compose.yml
# ============================================
# DOCKER COMPOSE
# ============================================

version: '3.8'

services:
  # Reactions Bot
  bot:
    build: .
    container_name: reactions_bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DATABASE_PATH=/app/data/reactions_bot.db
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot_network
  
  # PostgreSQL Database (opsional)
  postgres:
    image: postgres:15-alpine
    container_name: reactions_bot_db
    environment:
      POSTGRES_DB: reactions_bot
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge

volumes:
  postgres_data:

# ==============================================
# RUN COMMANDS:
# ==============================================
# docker-compose up -d                # Start
# docker-compose down                 # Stop
# docker-compose logs -f bot          # Logs
# docker-compose ps                   # Status
